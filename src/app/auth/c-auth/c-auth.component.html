<div class="auth-wrapper" [style.backgroundImage]="'url(assets/layout/images/pages/fondo_regis_contac2.png)'">
    <div class="auth-overlay"></div>

    <div class="auth-card-container">

        <ng-container *ngIf="vistaLista; else visSecciones">

            <div class="auth-card">
                <div class="auth-header">
                    <img class="auth-logo" src="assets/layout/images/ico_negativo_sinfondo.png" alt="Logo" />
                    <h1 class="auth-title">{{ headerTitle }}</h1>
                    <div class="auth-event-badge">
                        <i class="pi pi-calendar-clock mr-2"></i>
                        <span>{{ detEvento }}</span>
                    </div>
                </div>

                <div class="auth-divider">
                    <span>Completa tu registro</span>
                </div>

                <form [formGroup]="registerForm" class="auth-form">
                    <div class="auth-form-row">
                        <div class="auth-field">
                            <label class="auth-label">
                                <i class="pi pi-user mr-1"></i> Nombres
                            </label>
                            <input pInputText type="text" formControlName="nomcontacto"
                                class="auth-input" [readonly]="onlyRead"
                                placeholder="Ingresa tu nombre" />
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">
                                <i class="pi pi-user mr-1"></i> Apellidos
                            </label>
                            <input pInputText type="text" formControlName="apellidocontacto"
                                class="auth-input" [readonly]="onlyRead"
                                placeholder="Ingresa tus apellidos" />
                        </div>
                    </div>

                    <div class="auth-form-row">
                        <div class="auth-field">
                            <label class="auth-label">
                                <i class="pi pi-id-card mr-1"></i> Tipo Documento
                            </label>
                            <p-dropdown [options]="lstTipoDocPer" formControlName="idtipodoc"
                                optionLabel="valoritem" placeholder="Seleccionar..."
                                optionValue="coditem" (onChange)="cambioTipoDoc($event.value)"
                                styleClass="auth-dropdown" [readonly]="onlyRead">
                            </p-dropdown>
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">
                                <i class="pi pi-hashtag mr-1"></i> N° Documento
                            </label>
                            <input pInputText type="text" formControlName="nrodocumento"
                                class="auth-input" [readonly]="onlyRead"
                                placeholder="Número de documento" />
                        </div>
                    </div>

                    <div class="auth-form-row">
                        <div class="auth-field">
                            <label class="auth-label">
                                <i class="pi pi-briefcase mr-1"></i> Cargo
                            </label>
                            <input pInputText type="text" formControlName="cargo"
                                class="auth-input" [readonly]="onlyRead"
                                placeholder="Tu cargo" />
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">
                                <i class="pi pi-building mr-1"></i> Empresa
                            </label>
                            <input pInputText type="text" formControlName="empresa"
                                class="auth-input" [readonly]="onlyRead"
                                placeholder="Tu empresa" />
                        </div>
                    </div>

                    <div class="auth-form-row">
                        <div class="auth-field">
                            <label class="auth-label">
                                <i class="pi pi-phone mr-1"></i> Celular
                            </label>
                            <input pInputText type="text" formControlName="telefono"
                                class="auth-input" [readonly]="onlyRead"
                                placeholder="Número de celular" />
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">
                                <i class="pi pi-envelope mr-1"></i> Correo
                            </label>
                            <input pInputText type="text" formControlName="email"
                                class="auth-input" [readonly]="onlyRead"
                                placeholder="correo@ejemplo.com" />
                        </div>
                    </div>
                </form>

                <div class="auth-actions" *ngIf="!onlyRead">
                    <button pButton icon="pi pi-check-circle" label="CONFIRMAR REGISTRO"
                        class="auth-btn-confirm" (click)="guardarParticipante()">
                    </button>
                </div>
            </div>

        </ng-container>

        <ng-template #visSecciones>
            <div class="auth-card auth-success-card">
                <div class="auth-header">
                    <img class="auth-logo" src="assets/layout/images/ico_negativo_sinfondo.png" alt="Logo" />
                    <h1 class="auth-title">{{ headerTitle }}</h1>
                    <div class="auth-event-badge">
                        <i class="pi pi-calendar-clock mr-2"></i>
                        <span>{{ detEvento }}</span>
                    </div>
                </div>

                <div class="auth-success-body" *ngIf="onlyRead">
                    <div class="auth-success-icon">
                        <i class="pi pi-check-circle"></i>
                    </div>
                    <h2 class="auth-success-title">¡Registro Exitoso!</h2>
                    <p class="auth-success-subtitle">
                        Gracias por registrarte. Te esperamos en el evento.
                    </p>
                </div>
            </div>
        </ng-template>

    </div>
</div>

<app-c-progress-spinner *ngIf="blockedDocument" [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>
<p-toast></p-toast>
